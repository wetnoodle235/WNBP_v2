name: Deploy V5 Website to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "v5.0/website/**"
      - ".github/workflows/deploy-vercel-v5.yml"
  workflow_dispatch:

concurrency:
  group: vercel-v5-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: v5.0/website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Vercel secrets
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Required Vercel secrets are missing."
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: v5.0/website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          url=$(vercel deploy --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed URL: $url"

      - name: Verify deployed homepage
        run: |
          url='${{ steps.deploy.outputs.url }}'
          if [ -z "$url" ]; then
            echo "No deployment URL captured."
            exit 1
          fi
          for i in 1 2 3; do
            code=$(curl --max-time 20 -s -o /tmp/vercel_homepage.html -w '%{http_code}' "$url" || true)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Deployment did not return HTTP 200."
          exit 1
